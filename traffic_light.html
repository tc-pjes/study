<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紅綠燈號誌</title>

<style>
body {
    margin: 0;
    background: #2c3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 外框 */
.traffic-light {
    background: #222;
    padding: 2vh;
    border-radius: 2vh;
    display: flex;
    flex-direction: column;
    gap: 2vh;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* 燈 */
.light {
    width: 15vw;
    height: 15vw;
    max-width: 120px;
    max-height: 120px;
    min-width: 70px;
    min-height: 70px;
    border-radius: 50%;
    background: #444;
    transition: 0.3s;
}

/* 亮燈效果 */
.red.active {
    background: red;
    box-shadow: 0 0 30px red;
}

.yellow.active {
    background: gold;
    box-shadow: 0 0 30px gold;
}

.green.active {
    background: limegreen;
    box-shadow: 0 0 30px limegreen;
}
</style>
</head>

<body>

<div class="traffic-light">
    <div class="light red"></div>
    <div class="light yellow"></div>
    <div class="light green"></div>
</div>

<script>
let lights = {
    red: document.querySelector('.red'),
    yellow: document.querySelector('.yellow'),
    green: document.querySelector('.green')
};

function turnOffAll() {
    for (let key in lights) {
        lights[key].classList.remove('active');
    }
}

function startTrafficLight() {
    function cycle() {
        // 綠燈
        turnOffAll();
        lights.green.classList.add('active');

        setTimeout(() => {
            // 黃燈
            turnOffAll();
            lights.yellow.classList.add('active');

            setTimeout(() => {
                // 紅燈
                turnOffAll();
                lights.red.classList.add('active');

                setTimeout(cycle, 3000); // 回到綠燈
            }, 1500);

        }, 4000);
    }

    cycle();
}

startTrafficLight();
</script>

</body>
</html>
