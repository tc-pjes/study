<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>教育用紅綠燈系統</title>

<style>
:root {
    --scale: 1; /* 控制縮放的變數 */
}

body {
    margin: 0;
    background: #2c3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden; /* 防止全螢幕時出現捲軸 */
    touch-action: none; /* 禁用瀏覽器預設的手勢，改由 JS 控制 */
}

/* 佈局容器 */
.container {
    display: flex;
    transition: transform 0.1s ease-out;
    transform: scale(var(--scale));
    will-change: transform;
}

/* 預設直式 */
.container.vertical .traffic-light {
    flex-direction: column;
}

/* 橫式 */
.container.horizontal .traffic-light {
    flex-direction: row;
}

/* 紅綠燈主體 */
.traffic-light {
    background: #222;
    padding: 20px;
    border-radius: 25px;
    display: flex;
    gap: 20px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0,0,0,0.7);
}

/* 燈泡樣式 */
.light {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #444;
    transition: 0.3s;
    position: relative;
}

/* 亮燈效果 */
.active.red { background: #ff0000; box-shadow: 0 0 30px #ff0000, inset 0 0 10px rgba(255,255,255,0.5); }
.active.yellow { background: #ffcc00; box-shadow: 0 0 30px #ffcc00, inset 0 0 10px rgba(255,255,255,0.5); }
.active.green { background: #00ff00; box-shadow: 0 0 30px #00ff00, inset 0 0 10px rgba(255,255,255,0.5); }

/* 全螢幕按鈕 (浮動) */
#fullscreen-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    z-index: 100;
}
</style>
</head>

<body>

<button id="fullscreen-btn" onclick="toggleFullscreen()">進入全螢幕</button>

<div class="container vertical" id="container">
    <div class="traffic-light" id="trafficLight">
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
    </div>
</div>

<script>
let lights = {
    red: document.querySelector('.red'),
    yellow: document.querySelector('.yellow'),
    green: document.querySelector('.green')
};

let container = document.getElementById('container');
let trafficLight = document.getElementById('trafficLight');

// --- 1. 方向切換 ---
trafficLight.addEventListener('click', (e) => {
    // 只有在單指點擊（非縮放手勢）時才切換
    if (e.detail === 1) { 
        container.classList.toggle('vertical');
        container.classList.toggle('horizontal');
    }
});

// --- 2. 全螢幕功能 ---
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            alert(`無法切換全螢幕: ${err.message}`);
        });
        document.getElementById('fullscreen-btn').innerText = "退出全螢幕";
    } else {
        document.exitFullscreen();
        document.getElementById('fullscreen-btn').innerText = "進入全螢幕";
    }
}

// --- 3. 雙指縮放功能 ---
let initialDist = 0;
let currentScale = 1;

container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
        initialDist = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
    }
}, { passive: false });

container.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
        e.preventDefault();
        let dist = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
        
        let delta = dist / initialDist;
        let newScale = currentScale * delta;
        
        // 限制縮放範圍在 0.5 倍到 4 倍之間
        if (newScale > 0.5 && newScale < 4) {
            document.documentElement.style.setProperty('--scale', newScale);
        }
    }
}, { passive: false });

container.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) {
        // 更新當前比例，方便下次縮放
        currentScale = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--scale'));
    }
});

// --- 4. 紅綠燈邏輯 ---
function turnOffAll() {
    for (let key in lights) {
        lights[key].classList.remove('active');
    }
}

function startTrafficLight() {
    function cycle() {
        turnOffAll();
        lights.green.classList.add('active'); // 綠燈 4秒

        setTimeout(() => {
            turnOffAll();
            lights.yellow.classList.add('active'); // 黃燈 1.5秒

            setTimeout(() => {
                turnOffAll();
                lights.red.classList.add('active'); // 紅燈 3秒

                setTimeout(cycle, 3000);
            }, 1500);
        }, 4000);
    }
    cycle();
}

startTrafficLight();
</script>

</body>
</html>
