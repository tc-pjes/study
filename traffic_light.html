<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紅綠燈</title>

<style>
body {
    margin: 0;
    background: #2c3e50;

    display: flex;
    justify-content: center;
    align-items: center;

    height: 100dvh; /* 🔥 重點：手機滿版 */
}

/* 外框 */
.container {
    display: flex;
}

/* 預設直式 */
.container.vertical .traffic-light {
    flex-direction: column;
}

/* 橫式 */
.container.horizontal .traffic-light {
    flex-direction: row;
}

/* 紅綠燈 */
.traffic-light {
    background: #222;
    padding: 20px;
    border-radius: 20px;
    display: flex;
    gap: 20px;
    cursor: pointer; /* 👉 提示可點擊 */
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* 燈 */
.light {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #444;
    transition: 0.3s;
}

/* 亮燈 */
.active.red { background: red; box-shadow: 0 0 20px red; }
.active.yellow { background: gold; box-shadow: 0 0 20px gold; }
.active.green { background: limegreen; box-shadow: 0 0 20px limegreen; }

</style>
</head>

<body>

<div class="container vertical" id="container">
    <div class="traffic-light" onclick="toggleLayout()">
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
    </div>
</div>

<script>
let lights = {
    red: document.querySelector('.red'),
    yellow: document.querySelector('.yellow'),
    green: document.querySelector('.green')
};

let container = document.getElementById('container');

/* 點擊切換方向 */
function enterFullscreen() {
    let elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    }
}

/* 點擊同時切換 + 全螢幕 */
function toggleLayout() {
    container.classList.toggle('vertical');
    container.classList.toggle('horizontal');

    enterFullscreen(); // 🔥 加這行
}

/* 關燈 */
function turnOffAll() {
    for (let key in lights) {
        lights[key].classList.remove('active');
    }
}

/* 主流程 */
function startTrafficLight() {

    function cycle() {

        // 綠燈
        turnOffAll();
        lights.green.classList.add('active');

        setTimeout(() => {

            // 黃燈
            turnOffAll();
            lights.yellow.classList.add('active');

            setTimeout(() => {

                // 紅燈
                turnOffAll();
                lights.red.classList.add('active');

                setTimeout(cycle, 3000);

            }, 1500);

        }, 4000);
    }

    cycle();
}

startTrafficLight();
</script>

</body>
</html>
